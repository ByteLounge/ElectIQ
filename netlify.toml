[build]
  command = "export PATH=$PATH:$(pwd)/node_modules/.bin && npm install && npm run build"
  publish = "frontend/dist"

[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"
  external_node_modules = ["firebase-admin", "jwks-rsa", "google-gax", "@grpc/grpc-js", "jose"]

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/api/:splat"
  status = 200

[context.production.environment]
  NODE_VERSION = "20"
